name: Deploy to server

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-filecapsa-main
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: [self-hosted, linux, x64, filecapsa]

    steps:
      - uses: actions/checkout@v4

      - name: Generate .env file
        uses: horlakz/secretenv@v1
        with:
          secrets_json: ${{ toJSON(secrets) }}

      - name: Set up golang
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build
        run: go build -o filecapsa .

      - name: Prepare release directory
        run: mkdir -p /opt/filecapsa/current

      - name: Deploy binary, env and runtime assets
        run: |
          install -m 0755 filecapsa /opt/filecapsa/current/filecapsa
          install -m 0600 .env /opt/filecapsa/current/.env
          rm -rf /opt/filecapsa/current/templates /opt/filecapsa/current/migrations
          cp -R templates /opt/filecapsa/current/templates
          cp -R migrations /opt/filecapsa/current/migrations

      - name: Reload systemd
        run: sudo systemctl daemon-reload

      - name: Restart service
        run: sudo systemctl restart filecapsa

      - name: Verify service
        run: sudo systemctl --no-pager --full status filecapsa
